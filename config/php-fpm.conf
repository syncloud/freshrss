[global]
pid = {{ .DataDir }}/php-fpm.pid
error_log = syslog
syslog.ident = {{ .App }}.php-fpm
daemonize = no

[www]
user = {{ .App }}
group = {{ .App }}
listen = {{ .DataDir }}/php-fpm.sock
listen.owner = {{ .App }}
listen.group = {{ .App }}
listen.mode = 0660

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 500

catch_workers_output = yes
decorate_workers_output = no
clear_env = no

env[DATA_PATH] = {{ .DataPath }}
env[SNAP] = {{ .AppDir }}
env[SNAP_DATA] = {{ .DataDir }}
env[SNAP_COMMON] = {{ .CommonDir }}
